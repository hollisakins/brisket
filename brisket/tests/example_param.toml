[base]
    redshift = 5
    igm      = "Inoue14" # Madau95, Inoue14
    damping  = "n" # need specify NH? 
    MWdust   = "n" # need specify coords?

[galaxy1]
    model    = "BC03"
    # imf      = "Chabrier"
    logMstar = 9.0
    metallicity = 0.1

    # sfh      = "delayed" 
    # age      = 0.2
    # tau      = 0.1
    
    # sfh       = "continuity" # or "bursty-continuity"
    # bin_edges = [0, 10, 50]
    # n_bins    = 6
    # z_max     = 20

    sfh       = "constant"
    age_min   = 0.0
    age_max   = 0.1
    
    [galaxy1.nebular] 
        logU = -2
        fesc = 0.5

    [galaxy1.dust_atten] 
        type = "Calzetti" # "Calzetti", "Cardelli", "SMC", "Salim", "CF00"
        Av   = 1
        eta  = 1
        
